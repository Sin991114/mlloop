<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLLoop Ledger</title>
<style>
/* ============ The Lab Ledger — tokens ============ */
:root {
  --paper: #f6f4ee;            /* page plane, warm paper */
  --surface: #fcfcfb;          /* card / chart surface (validated) */
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --hairline: #e1e0d9;
  --baseline: #c3c2b7;
  --accent: #8a3324;           /* editorial oxblood — chrome only, never data */
  --wash: rgba(138, 51, 36, 0.06);
  --series: #2a78d6;           /* categorical slot 1 — the metric line */
  --series-soft: rgba(42, 120, 214, 0.10);
  --good: #0ca30c; --warn: #fab219; --serious: #ec835a; --critical: #d03b3b;
  --good-text: #006300;
  --neutral-band: rgba(137, 135, 129, 0.12);
  --shadow: 0 18px 50px rgba(11, 11, 11, 0.18);
  --font-display: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --font-body: "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-mono: "Cascadia Mono", Consolas, "SF Mono", Menlo, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #0d0d0d; --surface: #1a1a19;
    --ink: #f4f2ec; --ink-2: #c3c2b7; --muted: #898781;
    --hairline: #2c2c2a; --baseline: #383835;
    --accent: #d08770; --wash: rgba(208, 135, 112, 0.08);
    --series: #3987e5; --series-soft: rgba(57, 135, 229, 0.14);
    --good-text: #0ca30c;
    --neutral-band: rgba(137, 135, 129, 0.16);
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
  }
}
:root[data-theme="light"] {
  --paper: #f6f4ee; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
  --muted: #898781; --hairline: #e1e0d9; --baseline: #c3c2b7;
  --accent: #8a3324; --wash: rgba(138, 51, 36, 0.06);
  --series: #2a78d6; --series-soft: rgba(42, 120, 214, 0.10);
  --good-text: #006300; --neutral-band: rgba(137, 135, 129, 0.12);
  --shadow: 0 18px 50px rgba(11, 11, 11, 0.18);
}
:root[data-theme="dark"] {
  --paper: #0d0d0d; --surface: #1a1a19; --ink: #f4f2ec; --ink-2: #c3c2b7;
  --muted: #898781; --hairline: #2c2c2a; --baseline: #383835;
  --accent: #d08770; --wash: rgba(208, 135, 112, 0.08);
  --series: #3987e5; --series-soft: rgba(57, 135, 229, 0.14);
  --good-text: #0ca30c; --neutral-band: rgba(137, 135, 129, 0.16);
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0; background: var(--paper); color: var(--ink);
  font-family: var(--font-body); font-size: 15px; line-height: 1.55;
}
.page { max-width: 1180px; margin: 0 auto; padding: 0 2.2rem 4rem; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.mono { font-family: var(--font-mono); }
.sc { font-variant: small-caps; letter-spacing: 0.14em; text-transform: lowercase; }

/* ============ masthead ============ */
header.masthead {
  border-top: 6px double var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 1.1rem 0 0.9rem; margin-top: 1.6rem;
  display: flex; align-items: baseline; gap: 1.4rem; flex-wrap: wrap;
}
.brand { font-family: var(--font-mono); font-size: 0.82rem; letter-spacing: 0.34em; font-weight: 600; }
.brand em { color: var(--accent); font-style: normal; }
.ledger-title { font-family: var(--font-display); font-style: italic; font-size: 1.7rem; flex: 1; min-width: 200px; }
.masthead-right { display: flex; align-items: center; gap: 0.9rem; font-size: 0.78rem; color: var(--ink-2); }
.pill {
  font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em;
  border: 1px solid var(--baseline); border-radius: 999px; padding: 0.22rem 0.7rem;
}
.pill.ready { border-color: var(--good); color: var(--good-text); }
.pill.busy { border-color: var(--series); color: var(--series); }
.pill.attn { border-color: var(--serious); color: var(--serious); }
#theme-toggle {
  cursor: pointer; border: 1px solid var(--hairline); background: var(--surface);
  color: var(--ink-2); border-radius: 999px; width: 30px; height: 30px; font-size: 0.9rem;
}
.attention {
  margin-top: 0.9rem; padding: 0.65rem 1rem; background: var(--wash);
  border-left: 3px solid var(--accent); font-size: 0.88rem; color: var(--ink-2);
}
.attention strong { color: var(--ink); }

/* ============ stat tiles ============ */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); margin: 1.4rem 0 0; }
.tile { padding: 0.4rem 1.3rem 0.6rem 0; border-right: 1px solid var(--hairline); margin-right: 1.3rem; }
.tile:last-child { border-right: none; margin-right: 0; }
.tile .label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.tile .value { font-family: var(--font-mono); font-size: 1.9rem; margin: 0.15rem 0 0.1rem; font-weight: 600; }
.tile .sub { font-size: 0.78rem; color: var(--ink-2); }
.tile .value .up { color: var(--good-text); } .tile .value .down { color: var(--critical); }
.meter { height: 3px; background: var(--hairline); margin-top: 0.5rem; border-radius: 2px; overflow: hidden; }
.meter i { display: block; height: 100%; background: var(--series); }

/* ============ sections ============ */
section { margin-top: 2.6rem; }
.sec-head { display: flex; align-items: baseline; gap: 0.7rem; margin-bottom: 1rem; }
.sec-num { font-family: var(--font-display); font-style: italic; font-size: 1.25rem; color: var(--accent); min-width: 1.6rem; }
.sec-title { font-size: 0.74rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-2); font-weight: 600; }
.sec-rule { flex: 1; border-top: 1px solid var(--hairline); transform: translateY(-0.35rem); }
.sec-tools { font-size: 0.74rem; }
.sec-tools button {
  background: none; border: none; cursor: pointer; font: inherit; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; padding: 0.1rem 0.5rem;
}
.sec-tools button.on { color: var(--accent); border-bottom: 2px solid var(--accent); }

.card { background: var(--surface); border: 1px solid var(--hairline); border-radius: 4px; }

/* ============ trajectory ============ */
#viz-wrap { position: relative; padding: 1.1rem 0.8rem 0.4rem; overflow-x: auto; }
#tooltip {
  position: absolute; pointer-events: none; display: none; z-index: 30;
  background: var(--surface); border: 1px solid var(--baseline); border-radius: 4px;
  box-shadow: var(--shadow); padding: 0.55rem 0.75rem; max-width: 300px; font-size: 0.78rem;
}
#tooltip .t-id { font-family: var(--font-mono); font-weight: 700; }
#tooltip .t-val { font-family: var(--font-mono); font-size: 0.95rem; margin: 0.15rem 0; }
#tooltip .t-intent { color: var(--ink-2); font-style: italic; font-family: var(--font-display); }
#tooltip .t-hyp { color: var(--muted); margin-top: 0.2rem; }
svg text { font-family: var(--font-mono); fill: var(--muted); }
.legend-line { font-size: 0.72rem; color: var(--muted); padding: 0 1.2rem 0.9rem; }
.legend-line b { color: var(--ink-2); font-weight: 600; }
.glyph-good { color: var(--good-text); } .glyph-bad { color: var(--critical); }
.glyph-flat { color: var(--warn); } .glyph-mut { color: var(--muted); }

/* ============ two-column: log + evidence ============ */
.columns { display: grid; grid-template-columns: minmax(0, 7fr) minmax(0, 5fr); gap: 2.4rem; }
@media (max-width: 900px) { .columns { grid-template-columns: 1fr; } }

.feed { border-left: 1px solid var(--hairline); padding-left: 0; list-style: none; margin: 0; }
.feed li { display: flex; gap: 0.9rem; padding: 0.5rem 0 0.5rem 0; align-items: baseline; }
.feed .when { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); min-width: 3.2rem; text-align: right; }
.feed .medal {
  min-width: 1.5rem; height: 1.5rem; border-radius: 50%; border: 1px solid var(--hairline);
  background: var(--surface); display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; transform: translateX(-0.78rem);
}
.feed .what { flex: 1; font-size: 0.86rem; color: var(--ink-2); }
.feed .what b { color: var(--ink); font-family: var(--font-mono); font-weight: 600; cursor: pointer; }
.feed .what i { font-family: var(--font-display); }
.feed .earlier { color: var(--muted); font-size: 0.76rem; padding-left: 1.6rem; }

.rail > div { padding: 1rem 0 1.2rem; border-bottom: 1px solid var(--hairline); }
.rail h4 { margin: 0 0 0.7rem; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.hyp { margin-bottom: 0.85rem; }
.hyp .h-line { display: flex; gap: 0.55rem; align-items: baseline; }
.hyp .h-id { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700; }
.hyp .h-state { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; }
.hyp .h-claim { font-family: var(--font-display); font-style: italic; font-size: 0.95rem; margin: 0.15rem 0 0.2rem; color: var(--ink); }
.hyp .h-ev { font-size: 0.72rem; color: var(--muted); }
.hyp .h-ev b { font-family: var(--font-mono); cursor: pointer; color: var(--accent); font-weight: 600; }
.verdict-quote { font-family: var(--font-display); font-style: italic; font-size: 1.05rem; margin: 0.3rem 0 0.5rem; }
.tag { display: inline-block; font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.1em;
       padding: 0.14rem 0.5rem; border-radius: 3px; border: 1px solid; }
.tag.bad { color: var(--critical); border-color: var(--critical); background: color-mix(in srgb, var(--critical) 8%, transparent); }
.tag.ok  { color: var(--good-text); border-color: var(--good); background: color-mix(in srgb, var(--good) 8%, transparent); }
.tag.mid { color: var(--serious); border-color: var(--serious); background: color-mix(in srgb, var(--serious) 8%, transparent); }
.dict dt { font-family: var(--font-mono); font-size: 0.76rem; font-weight: 600; margin-top: 0.5rem; }
.dict dd { margin: 0.05rem 0 0; font-size: 0.8rem; color: var(--ink-2); }
.dict .src { color: var(--muted); font-size: 0.7rem; }
.probe-item { font-size: 0.82rem; color: var(--ink-2); margin-bottom: 0.6rem; }

/* ============ drawer ============ */
#backdrop { position: fixed; inset: 0; background: rgba(11,11,11,0.35); display: none; z-index: 40; }
#drawer {
  position: fixed; top: 0; right: -540px; width: 520px; max-width: 94vw; height: 100vh;
  background: var(--surface); border-left: 1px solid var(--baseline); z-index: 50;
  transition: right 0.28s ease; overflow-y: auto; padding: 1.6rem 1.8rem 3rem;
  box-shadow: var(--shadow);
}
#drawer.open { right: 0; }
#drawer .d-close { position: sticky; top: 0; float: right; cursor: pointer; border: none;
  background: var(--surface); color: var(--muted); font-size: 1.1rem; }
#drawer h2 { font-family: var(--font-display); font-weight: 600; margin: 0 0 0.1rem; }
#drawer .d-kind { font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
#drawer .d-intent { font-family: var(--font-display); font-style: italic; color: var(--ink-2); margin: 0.7rem 0 1rem; }
#drawer table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
#drawer th { text-align: left; color: var(--muted); font-weight: 500; padding: 0.28rem 0.6rem 0.28rem 0; white-space: nowrap; vertical-align: top; }
#drawer td { font-family: var(--font-mono); padding: 0.28rem 0; border-bottom: 1px solid var(--hairline); }
#drawer h3 { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin: 1.5rem 0 0.6rem; }
.diag-item { margin-bottom: 0.55rem; font-size: 0.84rem; }
.diag-item b { font-family: var(--font-mono); font-size: 0.74rem; color: var(--accent); }
.diag-item span { color: var(--ink-2); }
#drawer figure { margin: 0.8rem 0; background: #fcfcfb; border: 1px solid var(--hairline); border-radius: 4px; padding: 0.5rem; }
#drawer figure img { max-width: 100%; display: block; }
#drawer figcaption { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 0.3rem 0.2rem 0; }

/* ============ misc ============ */
.empty { text-align: center; padding: 5rem 2rem; }
.empty .e-title { font-family: var(--font-display); font-style: italic; font-size: 1.6rem; }
.empty .e-sub { color: var(--muted); margin-top: 0.6rem; }
footer { margin-top: 3.5rem; border-top: 1px solid var(--hairline); padding-top: 0.8rem;
         font-size: 0.72rem; color: var(--muted); display: flex; justify-content: space-between; }
@keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.reveal { animation: rise 0.55s ease both; }
.r1 { animation-delay: 0.05s; } .r2 { animation-delay: 0.14s; } .r3 { animation-delay: 0.23s; } .r4 { animation-delay: 0.32s; }
</style>
</head>
<body>
<div class="page">
  <header class="masthead reveal r1">
    <span class="brand">ML<em>LOOP</em></span>
    <span class="ledger-title" id="ledger-title">Experiment Ledger</span>
    <span class="masthead-right">
      <span class="mono" id="today"></span>
      <span class="pill" id="state-pill">…</span>
      <button id="theme-toggle" title="theme">◐</button>
    </span>
  </header>
  <div id="attention"></div>
  <div id="app"><div class="empty"><div class="e-title">Opening the ledger…</div></div></div>
  <footer class="reveal r4">
    <span>MLLoop · the experiment ledger</span>
    <span class="mono" id="refreshed"></span>
  </footer>
</div>

<div id="backdrop" onclick="closeDrawer()"></div>
<aside id="drawer"></aside>
<div id="tooltip"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt = (v, d = 4) => v == null ? "—" : (typeof v === "number" ? +v.toFixed(d) : v);
let state = null, lastHash = "", view = "journey";

/* ---------- theme ---------- */
const savedTheme = localStorage.getItem("mlloop-theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
$("theme-toggle").onclick = () => {
  const cur = document.documentElement.dataset.theme ||
    (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("mlloop-theme", next);
  render();
};

/* ---------- derived facts ---------- */
function metricKey() { return state?.status?.goal?.primary_metric ?? null; }
function direction() { return state?.status?.goal?.metric_direction ?? "maximize"; }
function ledgerRuns() { return state.runs.filter(r => r.kind !== "forensics"); }
function latestFloor() {
  const runs = [...state.runs].reverse();
  for (const r of runs) if (r.noise_floor != null) return r.noise_floor;
  return null;
}
function outcomeOf(run, byId) {
  if (run.status === "running") return "running";
  if (run.status === "abandoned") return "abandoned";
  if (run.kind === "baseline" || !run.parent_run_id) return "baseline";
  const m = metricKey(), v = run[m], p = byId[run.parent_run_id]?.[m];
  if (v == null || p == null) return "baseline";
  let d = direction() === "maximize" ? v - p : p - v;
  const floor = run.noise_floor ?? latestFloor() ?? 0;
  if (Math.abs(d) < floor) return "flat";
  return d > 0 ? "improved" : "regressed";
}
const OUTCOME = {
  improved:  { color: "var(--good)",     glyph: "▲", word: "improved" },
  regressed: { color: "var(--critical)", glyph: "▼", word: "regressed" },
  flat:      { color: "var(--warn)",     glyph: "≈", word: "within noise" },
  baseline:  { color: "var(--muted)",    glyph: "○", word: "baseline" },
  running:   { color: "var(--series)",   glyph: "●", word: "running" },
  abandoned: { color: "var(--baseline)", glyph: "◌", word: "abandoned" },
};
const HYP = {
  confirmed:    { glyph: "✓", cls: "glyph-good", color: "var(--good-text)" },
  refuted:      { glyph: "✗", cls: "glyph-bad",  color: "var(--critical)" },
  inconclusive: { glyph: "~", cls: "glyph-flat", color: "var(--serious)" },
  testing:      { glyph: "◐", cls: "glyph-flat", color: "var(--warn)" },
  open:         { glyph: "○", cls: "glyph-mut",  color: "var(--muted)" },
};

/* ---------- masthead & tiles ---------- */
function renderMasthead() {
  const s = state.status;
  const ws = state.workspace.replace(/\\/g, "/").split("/").filter(Boolean).pop();
  $("ledger-title").textContent = ws ? `Experiment Ledger — ${ws}` : "Experiment Ledger";
  document.title = `${ws ?? "MLLoop"} · MLLoop Ledger`;
  $("today").textContent = new Date().toISOString().slice(0, 10);
  const pill = $("state-pill");
  pill.textContent = s.state.toLowerCase().replace(/_/g, " ");
  pill.className = "pill " + (s.state === "READY" ? "ready" : s.state === "RUN_IN_PROGRESS" ? "busy" : "attn");

  let attn = "";
  if (s.state === "NEED_GOAL") attn = "";
  else if (s.state === "RUN_IN_PROGRESS")
    attn = `<strong>${esc(s.running_run.id)} is running</strong> — <i>${esc(s.running_run.intent)}</i>`;
  else if (s.state === "DIAGNOSE_PENDING")
    attn = `<strong>Diagnosis pending.</strong> ${esc(s.hint || "The last finished run has not been diagnosed yet.")}`;
  else if (s.stagnation?.forensics_recommended)
    attn = `<strong>${s.stagnation.consecutive_non_improving_runs} runs without improvement</strong> — the ledger recommends interrogating the data: <span class="mono">forensics_run</span>.`;
  $("attention").innerHTML = attn ? `<div class="attention reveal r1">${attn}</div>` : "";
}

function tile(label, value, sub, extra = "") {
  return `<div class="tile"><div class="label">${label}</div>
    <div class="value">${value}</div><div class="sub">${sub}</div>${extra}</div>`;
}
function renderTiles() {
  const s = state.status, m = metricKey(), goal = s.goal;
  const best = s.best_run ? s.best_run[m] : null;
  const target = goal.target_value;
  let progress = "";
  if (best != null && target != null) {
    const base = ledgerRuns().find(r => r.kind === "baseline")?.[m];
    const den = target - (base ?? 0), num = best - (base ?? 0);
    const pct = den > 0 ? Math.max(0, Math.min(100, 100 * num / den)) : (best >= target ? 100 : 0);
    progress = `<div class="meter"><i style="width:${pct.toFixed(0)}%"></i></div>`;
  }
  const met = best != null && target != null &&
    (direction() === "maximize" ? best >= target : best <= target);
  const hyp = s.hypotheses || {};
  const hypStr = ["confirmed", "refuted", "inconclusive", "testing", "open"]
    .filter(k => hyp[k]).map(k => `<span class="${HYP[k].cls}">${HYP[k].glyph}${hyp[k]}</span>`).join(" ") || "—";
  const floor = latestFloor();
  const verdict = s.latest_forensics;
  $("tiles").innerHTML =
    tile(`best ${esc(m)}`, `${fmt(best)}${s.best_run ? ` <span class="sub mono">${esc(s.best_run.id)}</span>` : ""}`,
         target != null ? (met ? `target ${fmt(target)} <span class="glyph-good">met ✓</span>` : `target ${fmt(target)}`) : "no target set", progress)
    + tile("noise floor", floor != null ? `±${fmt(floor)}` : "—", "min. believable delta")
    + tile("budget", `${s.budget.runs_started}<span class="sub">/${s.budget.max_runs}</span>`, "runs started")
    + tile("hypotheses", hypStr, "✓ confirmed · ✗ refuted")
    + tile("data verdict", verdict ? `<span class="tag ${verdict.verdict === "model_limited" ? "ok" : "bad"}">${esc(verdict.verdict.replace(/_/g, " "))}</span>` : "—",
           verdict ? `<a href="/verdict/${esc(verdict.id)}" target="_blank">open report →</a>` : "no forensics yet");
}

/* ---------- I. trajectory ---------- */
function renderJourney() {
  const m = metricKey();
  const runs = ledgerRuns();
  const byId = {}; state.runs.forEach(r => byId[r.id] = r);
  const pts = runs.filter(r => r[m] != null);
  if (pts.length === 0) return `<div class="empty"><div class="e-sub">No finished runs yet.</div></div>`;
  const probes = state.runs.filter(r => r.kind === "forensics" && r[m] != null);

  const W = Math.max(760, (pts.length + probes.length) * 110 + 140), H = 340;
  const L = 64, R = 30, T = 26, B = 44;
  const target = state.status.goal.target_value;
  const values = pts.map(r => r[m]).concat(target != null ? [target] : []);
  let lo = Math.min(...values), hi = Math.max(...values);
  const pad = (hi - lo || 1) * 0.14; lo -= pad; hi += pad;
  const X = i => L + i * (W - L - R) / Math.max(pts.length - 1, 1);
  const Y = v => T + (H - T - B) * (1 - (v - lo) / (hi - lo));

  let g = "";
  // gridlines + y ticks
  for (let i = 0; i <= 4; i++) {
    const v = lo + (hi - lo) * i / 4, y = Y(v);
    g += `<line x1="${L}" y1="${y}" x2="${W - R}" y2="${y}" stroke="var(--hairline)"/>`
       + `<text x="${L - 8}" y="${y + 3}" text-anchor="end" font-size="10">${fmt(v, 3)}</text>`;
  }
  // noise band around best
  const best = state.status.best_run?.[m], floor = latestFloor();
  if (best != null && floor != null) {
    const y1 = Y(best + floor), y2 = Y(best - floor);
    g += `<rect x="${L}" y="${Math.min(y1, y2)}" width="${W - L - R}" height="${Math.abs(y2 - y1)}" fill="var(--neutral-band)"/>`
       + `<text x="${W - R - 4}" y="${Math.min(y1, y2) + 11}" text-anchor="end" font-size="9">noise floor ±${fmt(floor)}</text>`;
  }
  // target
  if (target != null) {
    g += `<line x1="${L}" y1="${Y(target)}" x2="${W - R}" y2="${Y(target)}" stroke="var(--accent)" stroke-dasharray="6 5" stroke-width="1.4"/>`
       + `<text x="${L + 4}" y="${Y(target) - 6}" font-size="10" fill="var(--accent)">target ${fmt(target)}</text>`;
  }
  // metric line
  g += `<polyline fill="none" stroke="var(--series)" stroke-width="2" points="${pts.map((r, i) => `${X(i)},${Y(r[m])}`).join(" ")}"/>`;
  // hypothesis annotations on segments
  pts.forEach((r, i) => {
    if (i === 0 || !r.hypothesis_id) return;
    const hyp = state.hypotheses.find(h => h.id === r.hypothesis_id);
    const hs = HYP[hyp?.status] ?? HYP.open;
    const mx = (X(i - 1) + X(i)) / 2, my = (Y(pts[i - 1][m]) + Y(r[m])) / 2;
    g += `<text x="${mx}" y="${my - 9}" text-anchor="middle" font-size="11" font-style="italic"
           font-family="var(--font-display)" fill="${hs.color}">${esc(r.hypothesis_id)} ${hs.glyph}</text>`;
  });
  // markers
  pts.forEach((r, i) => {
    const o = OUTCOME[outcomeOf(r, byId)];
    const isBest = state.status.best_run && r.id === state.status.best_run.id;
    g += `<circle cx="${X(i)}" cy="${Y(r[m])}" r="5.5" fill="${o.color}" stroke="var(--surface)" stroke-width="2"/>`;
    if (isBest) g += `<circle cx="${X(i)}" cy="${Y(r[m])}" r="9.5" fill="none" stroke="${o.color}" stroke-width="1" stroke-dasharray="2 2"/>`
      + `<text x="${X(i)}" y="${Y(r[m]) - 15}" text-anchor="middle" font-size="10" fill="var(--ink-2)" font-weight="600">${fmt(r[m])}</text>`;
    g += `<text x="${X(i)}" y="${H - B + 18}" text-anchor="middle" font-size="10">${esc(r.id)}</text>`
       + `<circle cx="${X(i)}" cy="${Y(r[m])}" r="14" fill="transparent" style="cursor:pointer"
           onmousemove="showTip(event,'${r.id}')" onmouseleave="hideTip()" onclick="openRun('${r.id}')"/>`;
  });
  // forensics probes as detached diamonds after the line
  probes.forEach((r, j) => {
    const x = X(pts.length - 1) + (j + 1) * 70, y = Y(r[m]);
    if (x > W - R) return;
    g += `<path d="M ${x} ${y - 6} L ${x + 6} ${y} L ${x} ${y + 6} L ${x - 6} ${y} Z" fill="none" stroke="var(--muted)" stroke-width="1.6"/>`
       + `<text x="${x}" y="${H - B + 18}" text-anchor="middle" font-size="10">${esc(r.id)}</text>`
       + `<circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer"
           onmousemove="showTip(event,'${r.id}')" onmouseleave="hideTip()" onclick="openRun('${r.id}')"/>`;
  });
  g += `<line x1="${L}" y1="${H - B}" x2="${W - R}" y2="${H - B}" stroke="var(--baseline)"/>`;

  const legend = `<div class="legend-line">
      <b>${esc(m)}</b> per run · <span class="glyph-good">▲ improved</span> ·
      <span class="glyph-flat">≈ within noise</span> · <span class="glyph-bad">▼ regressed</span> ·
      <span class="glyph-mut">○ baseline &nbsp;◇ forensics probe (separate protocol)</span> ·
      dashed ring = best · shaded band = noise floor around best</div>`;
  return `<div id="viz-wrap"><svg width="${W}" height="${H}">${g}</svg></div>${legend}`;
}

function renderLineage() {
  const runs = state.runs;
  if (!runs.length) return `<div class="empty"><div class="e-sub">No runs yet.</div></div>`;
  const byId = {}; runs.forEach(r => byId[r.id] = r);
  const depth = {};
  runs.forEach(function walk(r) {
    if (depth[r.id] != null) return depth[r.id];
    depth[r.id] = (r.parent_run_id && byId[r.parent_run_id]) ? walk(byId[r.parent_run_id]) + 1 : 0;
    return depth[r.id];
  });
  const levels = {};
  runs.forEach(r => (levels[depth[r.id]] = levels[depth[r.id]] || []).push(r));
  const pos = {}, CW = 190, CH = 96;
  Object.entries(levels).forEach(([d, list]) =>
    list.forEach((r, i) => pos[r.id] = { x: i * CW + 105, y: d * CH + 52 }));
  const W = Math.max(...Object.values(pos).map(p => p.x)) + 120;
  const H = Math.max(...Object.values(pos).map(p => p.y)) + 66;
  const m = metricKey();
  let g = "";
  runs.forEach(r => {
    const p = pos[r.id];
    if (r.parent_run_id && pos[r.parent_run_id]) {
      const q = pos[r.parent_run_id];
      g += `<line x1="${q.x}" y1="${q.y + 28}" x2="${p.x}" y2="${p.y - 28}" stroke="var(--baseline)" stroke-width="1.2"/>`;
      if (r.hypothesis_id) {
        const hs = HYP[state.hypotheses.find(h => h.id === r.hypothesis_id)?.status] ?? HYP.open;
        g += `<text x="${(q.x + p.x) / 2 + 8}" y="${(q.y + p.y) / 2 + 4}" font-size="11" font-style="italic"
              font-family="var(--font-display)" fill="${hs.color}">${esc(r.hypothesis_id)} ${hs.glyph}</text>`;
      }
    }
  });
  runs.forEach(r => {
    const p = pos[r.id], o = OUTCOME[outcomeOf(r, byId)];
    g += `<g style="cursor:pointer" onclick="openRun('${r.id}')">
      <rect x="${p.x - 82}" y="${p.y - 28}" width="164" height="56" rx="5" fill="var(--surface)" stroke="${o.color}" stroke-width="2"/>
      <text x="${p.x - 70}" y="${p.y - 8}" font-size="12" font-weight="700" fill="var(--ink)">${esc(r.id)}</text>
      <text x="${p.x + 70}" y="${p.y - 8}" font-size="10" text-anchor="end">${o.glyph} ${esc(r.kind)}</text>
      <text x="${p.x - 70}" y="${p.y + 13}" font-size="11" fill="var(--ink-2)">${esc(m)} ${fmt(r[m])}${r.diagnosed ? "  ⌕" : ""}</text>
    </g>`;
  });
  return `<div id="viz-wrap"><svg width="${W}" height="${H}">${g}</svg></div>
    <div class="legend-line">parent → child lineage · border = outcome vs parent · ⌕ = diagnosed · click a run for its dossier</div>`;
}

/* ---------- tooltip ---------- */
function showTip(ev, runId) {
  const r = state.runs.find(x => x.id === runId);
  if (!r) return;
  const byId = {}; state.runs.forEach(x => byId[x.id] = x);
  const m = metricKey(), o = OUTCOME[outcomeOf(r, byId)];
  const parent = byId[r.parent_run_id];
  const delta = parent && r[m] != null && parent[m] != null ? r[m] - parent[m] : null;
  const hyp = state.hypotheses.find(h => h.id === r.hypothesis_id);
  const tip = $("tooltip");
  tip.innerHTML = `<div class="t-id">${esc(r.id)} · ${esc(r.kind)}</div>
    <div class="t-val">${esc(m)} ${fmt(r[m])}${delta != null ? ` <span style="color:${o.color}">(${delta >= 0 ? "+" : ""}${fmt(delta)} ${o.glyph})</span>` : ""}</div>
    <div class="t-intent">${esc(r.intent)}</div>
    ${hyp ? `<div class="t-hyp">${esc(hyp.id)}: ${esc(hyp.statement.slice(0, 90))}${hyp.statement.length > 90 ? "…" : ""}</div>` : ""}`;
  tip.style.display = "block";
  tip.style.left = Math.min(ev.pageX + 14, document.body.clientWidth - 320) + "px";
  tip.style.top = (ev.pageY + 14) + "px";
}
function hideTip() { $("tooltip").style.display = "none"; }

/* ---------- II. overnight log ---------- */
const EVENT_STYLE = {
  goal_defined:          { glyph: "⚑", tell: e => `goal locked — <b>${esc(e.primary_metric)}</b> on ${e.dataset_rows} rows` },
  run_started:           { glyph: "▸", tell: e => `<b onclick="openRun('${esc(e.run_id)}')">${esc(e.run_id)}</b> started — <i>${esc(e.intent)}</i>` },
  run_finished:          { glyph: "◆", tell: e => runFinishedTell(e) },
  run_abandoned:         { glyph: "◌", tell: e => `<b>${esc(e.run_id)}</b> abandoned — ${esc(e.reason)}` },
  run_diagnosed:         { glyph: "⌕", tell: e => `<b onclick="openRun('${esc(e.run_id)}')">${esc(e.run_id)}</b> diagnosed — ${(e.conclusions || []).length} findings` },
  hypothesis_registered: { glyph: "◇", tell: e => `<b>${esc(e.id)}</b> registered — <i>${esc(e.statement)}</i>` },
  hypothesis_resolved:   { glyph: "…", tell: e => hypResolvedTell(e) },
  decision_recorded:     { glyph: "⚖", tell: e => `decision <b>${esc(e.id)}</b> — ${esc(e.summary)}` },
  forensics_completed:   { glyph: "⚗", tell: e => `forensics <b>${esc(e.id)}</b> — verdict <b>${esc(e.verdict)}</b>: <i>${esc(e.headline)}</i>` },
  fe_probe_completed:    { glyph: "⚙", tell: e => `FE probe <b>${esc(e.id)}</b> — ${esc(e.conclusion)}` },
  context_registered:    { glyph: "✎", tell: e => `semantics: <b>${esc(e.feature)}</b> — ${esc(e.meaning)}` },
  report_generated:      { glyph: "☰", tell: e => `${esc(e.report_kind ?? "")} report generated` },
  run_finish_rejected:   { glyph: "⛔", tell: e => `<b>${esc(e.run_id)}</b> finish refused — artifact contract not met` },
};
function runFinishedTell(e) {
  const m = metricKey(), r = state.runs.find(x => x.id === e.run_id);
  if (!r) return `<b>${esc(e.run_id)}</b> finished`;
  const byId = {}; state.runs.forEach(x => byId[x.id] = x);
  const o = OUTCOME[outcomeOf(r, byId)];
  const parent = byId[r.parent_run_id];
  const delta = parent && r[m] != null && parent[m] != null ? r[m] - parent[m] : null;
  return `<b onclick="openRun('${esc(r.id)}')">${esc(r.id)}</b> finished — ${esc(m)} <b>${fmt(r[m])}</b>` +
    (delta != null ? ` <span style="color:${o.color}">${delta >= 0 ? "+" : ""}${fmt(delta)} ${o.glyph} ${o.word}</span>` : "");
}
function hypResolvedTell(e) {
  const hs = HYP[e.resolution] ?? HYP.open;
  return `<b>${esc(e.id)}</b> <span style="color:${hs.color}">${hs.glyph} ${esc(e.resolution)}</span>` +
         ` — evidence ${(e.evidence_run_ids || []).map(r => `<b onclick="openRun('${esc(r)}')">${esc(r)}</b>`).join(", ")}`;
}
function renderFeed() {
  const events = [...(state.events || [])].reverse();
  if (!events.length) return `<div class="empty"><div class="e-sub">Nothing logged yet.</div></div>`;
  const shown = events.slice(0, 34);
  const items = shown.map(e => {
    const st = EVENT_STYLE[e.kind] ?? { glyph: "·", tell: () => esc(e.kind) };
    let glyph = st.glyph, color = "var(--muted)";
    if (e.kind === "hypothesis_resolved") { const hs = HYP[e.resolution] ?? HYP.open; glyph = hs.glyph; color = hs.color; }
    if (e.kind === "run_finished") {
      const r = state.runs.find(x => x.id === e.run_id);
      if (r) { const byId = {}; state.runs.forEach(x => byId[x.id] = x); const o = OUTCOME[outcomeOf(r, byId)]; glyph = o.glyph; color = o.color; }
    }
    const when = (e.ts || "").slice(11, 16) || "·";
    return `<li><span class="when">${esc(when)}</span>
      <span class="medal" style="color:${color}">${glyph}</span>
      <span class="what">${st.tell(e)}</span></li>`;
  }).join("");
  const more = events.length > shown.length ? `<li class="earlier">… ${events.length - shown.length} earlier entries in the ledger</li>` : "";
  return `<ul class="feed">${items}${more}</ul>`;
}

/* ---------- III. evidence rail ---------- */
function renderRail() {
  const hyps = [...state.hypotheses].reverse();
  const hypHtml = hyps.length ? hyps.map(h => {
    const hs = HYP[h.status] ?? HYP.open;
    return `<div class="hyp">
      <div class="h-line"><span class="h-id">${esc(h.id)}</span>
        <span class="h-state" style="color:${hs.color}">${hs.glyph} ${esc(h.status)}</span></div>
      <div class="h-claim">“${esc(h.statement)}”</div>
      ${h.resolution_narrative ? `<div class="h-ev">${esc(h.resolution_narrative)}</div>` : ""}
      ${h.evidence_run_ids ? `<div class="h-ev">evidence: ${h.evidence_run_ids.map(r => `<b onclick="openRun('${esc(r)}')">${esc(r)}</b>`).join(" · ")}</div>` : ""}
    </div>`;
  }).join("") : `<div class="sub" style="color:var(--muted);font-size:0.8rem">None yet — hypotheses are the price of admission for experiments.</div>`;

  const f = state.forensics.at(-1);
  const verdictHtml = f ? `
      <span class="tag ${f.verdict.verdict === "model_limited" ? "ok" : (f.verdict.verdict === "more_data_needed" ? "mid" : "bad")}">${esc(f.verdict.verdict.replace(/_/g, " "))}</span>
      <span class="sub" style="color:var(--muted);font-size:0.72rem"> confidence: ${esc(f.verdict.confidence)}</span>
      <div class="verdict-quote">“${esc(f.verdict.headline)}”</div>
      <a href="/verdict/${esc(f.id)}" target="_blank">Open the full Data Verdict Report →</a>`
    : `<div style="color:var(--muted);font-size:0.8rem">No forensics yet. When runs stagnate, interrogate the data itself.</div>`;

  const probes = state.fe_probes.map(p => `<div class="probe-item">
      <span class="tag ${p.verdict === "fe_worth_testing" ? "ok" : "mid"}">${esc(p.verdict.replace(/_/g, " "))}</span>
      <span class="mono" style="font-size:0.7rem">${esc(p.id)}</span><br>${esc(p.conclusion)}</div>`).join("")
    || `<div style="color:var(--muted);font-size:0.8rem">No probes run. <span class="mono">fe_probe</span> prices feature engineering before you spend runs on it.</div>`;

  const dict = state.context.length ? `<dl class="dict">` + state.context.map(c =>
      `<dt>${esc(c.feature)}</dt><dd>${esc(c.meaning)}${c.source ? ` <span class="src">— ${esc(c.source)}</span>` : ""}</dd>`).join("") + `</dl>`
    : `<div style="color:var(--muted);font-size:0.8rem">No semantics registered. <span class="mono">context_register</span> makes the ledger domain-readable.</div>`;

  return `<div class="rail">
    <div><h4>Hypotheses</h4>${hypHtml}</div>
    <div><h4>Data verdict</h4>${verdictHtml}</div>
    <div><h4>FE opportunity</h4>${probes}</div>
    <div><h4>Data dictionary</h4>${dict}</div>
  </div>`;
}

/* ---------- drawer ---------- */
async function openRun(runId) {
  const res = await fetch("/api/run/" + runId);
  if (!res.ok) return;
  const data = await res.json();
  const r = data.run, m = metricKey();
  const byId = {}; state.runs.forEach(x => byId[x.id] = x);
  const o = OUTCOME[outcomeOf(byId[r.id] ?? r, byId)];
  const repro = (r.artifact_report || {}).reproducibility || {};
  let html = `<button class="d-close" onclick="closeDrawer()">✕</button>
    <div class="d-kind">${esc(r.kind)} · ${esc(r.status)} · <span style="color:${o.color}">${o.glyph} ${o.word}</span></div>
    <h2>${esc(r.id)}</h2>
    <div class="d-intent">“${esc(r.intent)}”</div>
    <table>
      ${r.metrics ? Object.entries(r.metrics).map(([k, v]) => `<tr><th>${esc(k)}</th><td>${fmt(v)}</td></tr>`).join("") : ""}
      <tr><th>hypothesis</th><td>${esc(r.hypothesis_id || "—")}</td></tr>
      <tr><th>parent</th><td>${esc(r.parent_run_id || "—")}</td></tr>
      ${r.meta ? `<tr><th>model</th><td>${esc(r.meta.model_desc)}</td></tr><tr><th>seed</th><td>${esc(r.meta.seed)}</td></tr>` : ""}
      ${repro.model_file ? `<tr><th>deliverables</th><td>${esc(repro.train_script)} · ${esc(repro.infer_script)} · ${esc(repro.model_file)}</td></tr>` : ""}
      ${r.abandon_reason ? `<tr><th>abandoned</th><td>${esc(r.abandon_reason)}</td></tr>` : ""}
    </table>`;
  if (data.diagnosis) {
    html += `<h3>Diagnosis</h3>` + Object.entries(data.diagnosis.items).map(([k, item]) =>
      `<div class="diag-item"><b>${esc(k)}</b><br><span>${esc(item.conclusion)}</span></div>`).join("");
    const withCharts = Object.entries(data.diagnosis.items).filter(([, it]) => it.chart);
    if (withCharts.length) {
      html += `<h3>Figures</h3>` + withCharts.map(([k, it]) =>
        `<figure><img loading="lazy" src="/charts/runs/${esc(r.id)}/${esc(it.chart)}"><figcaption>${esc(k.replace(/_/g, " "))}</figcaption></figure>`).join("");
    }
  } else if (r.status === "finished" && r.kind !== "forensics") {
    html += `<h3>Diagnosis</h3><div class="diag-item"><span>Not diagnosed yet — the harness will refuse the next experiment until <span class="mono">diagnose_run('${esc(r.id)}')</span> runs.</span></div>`;
  }
  $("drawer").innerHTML = html;
  $("drawer").classList.add("open");
  $("backdrop").style.display = "block";
}
function closeDrawer() { $("drawer").classList.remove("open"); $("backdrop").style.display = "none"; }
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

/* ---------- assembly ---------- */
function setView(v) { view = v; render(); }
function render() {
  if (!state) return;
  renderMasthead();
  if (state.status.state === "NEED_GOAL") {
    $("app").innerHTML = `<div class="empty reveal r2">
      <div class="e-title">This ledger is blank.</div>
      <div class="e-sub">Point your agent at this workspace — it starts with <span class="mono">goal_define</span>.</div></div>`;
    return;
  }
  $("app").innerHTML = `
    <div class="tiles reveal r2" id="tiles"></div>
    <section class="reveal r3">
      <div class="sec-head"><span class="sec-num">I.</span><span class="sec-title">Trajectory</span>
        <span class="sec-rule"></span>
        <span class="sec-tools">
          <button class="${view === "journey" ? "on" : ""}" onclick="setView('journey')">journey</button>
          <button class="${view === "lineage" ? "on" : ""}" onclick="setView('lineage')">lineage</button>
        </span></div>
      <div class="card" id="viz"></div>
    </section>
    <section class="reveal r4"><div class="columns">
      <div>
        <div class="sec-head"><span class="sec-num">II.</span><span class="sec-title">Overnight log</span><span class="sec-rule"></span></div>
        <div id="feed"></div>
      </div>
      <div>
        <div class="sec-head"><span class="sec-num">III.</span><span class="sec-title">Evidence</span><span class="sec-rule"></span></div>
        <div id="rail"></div>
      </div>
    </div></section>`;
  renderTiles();
  $("viz").innerHTML = view === "journey" ? renderJourney() : renderLineage();
  $("feed").innerHTML = renderFeed();
  $("rail").innerHTML = renderRail();
}

async function load() {
  try {
    const res = await fetch("/api/state");
    const next = await res.json();
    const hash = JSON.stringify(next);
    $("refreshed").textContent = "refreshed " + new Date().toTimeString().slice(0, 8);
    if (hash === lastHash) return;
    lastHash = hash; state = next;
    render();
  } catch {
    $("state-pill").textContent = "disconnected";
    $("state-pill").className = "pill attn";
  }
}
load();
setInterval(load, 5000);
</script>
</body>
</html>
